<html lang="ja">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f2ed; --surface: #fffefb; --border: #e0dbd3;
  --text: #1a1814; --muted: #7a756e; --accent: #2d4a3e;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 80px; }

header { background: var(--accent); color: #fff; padding: 18px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
.header-inner { max-width: 920px; margin: 0 auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header-title { font-size: 17px; font-weight: 700; flex: 1; }
.header-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.total-progress { display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 12px; }
.total-bar-wrap { width: 90px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 100px; overflow: hidden; }
.total-bar-fill { height: 100%; background: #7ecba8; border-radius: 100px; transition: width 0.4s; }
.total-label { opacity: 0.85; white-space: nowrap; }
.reset-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 100px; cursor: pointer; }

main { max-width: 920px; margin: 0 auto; padding: 20px 14px 0; }

.week-banner { border-radius: 14px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.week-banner.on-track { background: #e8f0ee; color: #1e3d32; }
.week-banner.behind { background: #fde8d8; color: #7a2e10; }
.week-banner.ahead { background: #e8ecf5; color: #1e2a45; }
.week-banner-icon { font-size: 28px; }
.week-banner-body { flex: 1; }
.week-banner-title { font-size: 15px; font-weight: 700; }
.week-banner-sub { font-size: 11px; margin-top: 3px; opacity: 0.8; }
.week-pct-big { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 700; }

.tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.tab { display: flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
.tab:hover { border-color: var(--accent); color: var(--text); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab-count { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.75; }
.tab-icon { font-size: 14px; }

.section { display: none; }
.section.visible { display: block; }

.section-hero { border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.hero-weekly { background: #e8ecf5; color: #1e2a45; }
.hero-chosashi { background: #ece8f0; color: #2e1e40; }
.hero-ryosoku { background: #e8f0ee; color: #1e3d32; }
.hero-schedule { background: #f0ede5; color: #3d3520; }
.section-icon { font-size: 24px; }
.section-prog-wrap { flex: 1; }
.section-title { font-size: 16px; font-weight: 700; }
.section-prog-bar { height: 7px; background: rgba(0,0,0,0.1); border-radius: 100px; overflow: hidden; margin-top: 5px; }
.section-prog-fill { height: 100%; border-radius: 100px; transition: width 0.4s; }
.section-prog-text { font-size: 11px; opacity: 0.75; font-family: 'DM Mono', monospace; }

.cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 14px; }
.cat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; transition: box-shadow 0.2s; }
.cat-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
.cat-header { display: flex; align-items: center; gap: 7px; padding: 9px 13px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; background: #faf9f6; }
.cat-header-icon { font-size: 14px; }
.cat-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); font-weight: 400; }
.cat-items { padding: 6px; }

.item { display: flex; align-items: flex-start; gap: 9px; padding: 7px 9px; border-radius: 8px; cursor: pointer; transition: background 0.15s; user-select: none; }
.item:hover { background: #f5f2ed; }
.item.checked { background: #f0f7f4; }
.checkbox { width: 18px; height: 18px; min-width: 18px; border: 2px solid #c8c3bc; border-radius: 5px; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.item.checked .checkbox { background: var(--accent); border-color: var(--accent); }
.checkmark { display: none; }
.item.checked .checkmark { display: block; }
.checkmark svg { display: block; }
.item-body { flex: 1; }
.item-name { font-size: 12px; font-weight: 500; line-height: 1.4; color: var(--text); }
.item.checked .item-name { text-decoration: line-through; color: var(--muted); }
.item-meta { font-size: 10.5px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.badge-tag { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 100px; margin-top: 3px; }
.badge-open { background: #e8f0ee; color: #1e3d32; }
.badge-wait { background: #f0ede5; color: #3d3520; }
.badge-key  { background: #fde8d8; color: #7a2e10; }

.cat-progress { display: flex; align-items: center; gap: 7px; padding: 4px 13px 9px; }
.mini-bar { flex: 1; height: 3px; background: var(--border); border-radius: 100px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 100px; transition: width 0.4s; }
.mini-pct { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); min-width: 26px; text-align: right; }

/* 週間カレンダー */
.weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 14px; }
.day-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 7px 3px; text-align: center; cursor: pointer; transition: all 0.2s; }
.day-card:hover { border-color: var(--accent); }
.day-card.done { background: #e8f0ee; border-color: #3d8c6e; }
.day-card.today { border-color: var(--accent); border-width: 2px; }
.day-name { font-size: 9px; color: var(--muted); font-weight: 500; }
.day-num { font-size: 14px; font-weight: 700; margin: 2px 0; font-family: 'DM Mono', monospace; }
.day-check { font-size: 14px; }
.day-card.done .day-check::after { content: '✅'; }
.day-card:not(.done) .day-check::after { content: '⬜'; }

/* 学習ログ */
.study-log { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.study-log h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.log-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.log-label { font-size: 11px; color: var(--muted); min-width: 70px; }
.log-input { flex: 1; min-width: 100px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 7px; padding: 5px 9px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); }
.log-input:focus { outline: none; border-color: var(--accent); }
.log-btn { background: var(--accent); color: #fff; border: none; padding: 7px 16px; border-radius: 100px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
.log-history { margin-top: 10px; }
.log-entry { display: flex; align-items: center; gap: 7px; padding: 6px 9px; border-radius: 7px; background: var(--bg); margin-bottom: 4px; font-size: 11px; }
.log-date { font-family: 'DM Mono', monospace; color: var(--muted); min-width: 65px; }
.log-content { flex: 1; }
.log-delete { color: var(--muted); cursor: pointer; font-size: 13px; padding: 0 3px; }
.log-delete:hover { color: #c0392b; }

/* スケジュールタブ */
.sched-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.sched-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; }
.sched-card-header { padding: 10px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sched-m1 { background: #e8f0ee; color: #1e3d32; }
.sched-m2 { background: #ece8f0; color: #2e1e40; }
.sched-m3 { background: #e8ecf5; color: #1e2a45; }
.sched-m4 { background: #f0ede5; color: #3d3520; }
.sched-m5 { background: #f0e8ea; color: #401e24; }
.sched-m6 { background: #e8f5f0; color: #0f3d2a; }
.sched-body { padding: 10px 14px; }
.sched-week { margin-bottom: 10px; }
.sched-week-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.sched-item { display: flex; align-items: flex-start; gap: 7px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
.sched-item:last-child { border-bottom: none; }
.sched-dot { width: 6px; height: 6px; min-width: 6px; border-radius: 50%; margin-top: 5px; }
.dot-chosashi { background: #7052a8; }
.dot-ryosoku  { background: #3d8c6e; }
.dot-other    { background: #b07d2e; }
.sched-text { font-size: 11.5px; line-height: 1.5; }
.sched-sub { font-size: 10px; color: var(--muted); }

.celebrate { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; align-items: center; justify-content: center; }
.celebrate.show { display: flex; }
.celebrate-card { background: var(--surface); border-radius: 20px; padding: 32px 24px; text-align: center; max-width: 280px; }
.celebrate-emoji { font-size: 40px; margin-bottom: 12px; }
.celebrate-title { font-size: 18px; font-weight: 700; margin-bottom: 7px; }
.celebrate-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
.celebrate-btn { background: var(--accent); color: #fff; border: none; padding: 9px 22px; border-radius: 100px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
</style>
</head>

    categories: [

        { name: '測量士補 全講義視聴完了', meta: '6/15公開後すぐスタート。目安：8月末', badge: 'open' },

      ]},

        { name: '測量士補 合格！午前免除申請', meta: '合格証明書取得 → 土地家屋調査士願書と同時申請', badge: 'wait' },

// ===== ストレージ =====
const state = {};
PHASES.filter(p => p.categories).forEach(p => {
  p.categories.forEach((c, ci) => {
    c.items.forEach((_, ii) => {
      const k = `ag-${p.id}-${ci}-${ii}`;
      try { state[k] = JSON.parse(localStorage.getItem(k) || 'false'); } catch { state[k] = false; }
    });
  });
});
function save(k) { try { localStorage.setItem(k, JSON.stringify(state[k])); } catch{} }

// ===== 週次 =====
function getWeekDays() {
  const today = new Date(); const dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({length: 7}, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return d; });
}
function dateKey(d) { return `study-day-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function isDayDone(d) { try { return JSON.parse(localStorage.getItem(dateKey(d)) || 'false'); } catch { return false; } }
function toggleDay(d) { const k = dateKey(d); try { localStorage.setItem(k, JSON.stringify(!isDayDone(d))); } catch {} buildWeekly(); updateBanner(); }
function getWeekDoneCount() { return getWeekDays().filter(d => isDayDone(d)).length; }

// ===== ログ =====
function getLogs() { try { return JSON.parse(localStorage.getItem('study-logs') || '[]'); } catch { return []; } }
function saveLogs(l) { try { localStorage.setItem('study-logs', JSON.stringify(l)); } catch {} }
function addLog() {
  const d = document.getElementById('logDate'), c = document.getElementById('logContent'), h = document.getElementById('logHours');
  if (!d||!c) return;
  if (!d.value || !c.value.trim()) { alert('日付と内容を入力してください'); return; }
  const logs = getLogs(); logs.unshift({ id: Date.now(), date: d.value, content: c.value.trim(), hours: h.value||'1' });
  saveLogs(logs.slice(0,50)); c.value = ''; renderLogs();
}
function deleteLog(id) { saveLogs(getLogs().filter(l => l.id !== id)); renderLogs(); }
function renderLogs() {
  const el = document.getElementById('logHistory'); if (!el) return;
  const logs = getLogs();
  el.innerHTML = logs.length === 0 ? '<div style="font-size:11px;color:var(--muted);padding:6px">まだ記録がありません</div>'
    : logs.slice(0,15).map(l => `<div class="log-entry"><span class="log-date">${l.date}</span><span class="log-content">${l.content}（${l.hours}h）</span><span class="log-delete" onclick="deleteLog(${l.id})">✕</span></div>`).join('');
}

// ===== バナー =====
function updateBanner() {
  const done = getWeekDoneCount(), target = 5;
  const pct = Math.round(done / target * 100);
  const b = document.getElementById('weekBanner'), i = document.getElementById('bannerIcon');
  const t = document.getElementById('bannerTitle'), s = document.getElementById('bannerSub'), p = document.getElementById('bannerPct');
  p.textContent = Math.min(pct,100) + '%';
  if (done >= target) { b.className='week-banner ahead'; i.textContent='🏆'; t.textContent='今週の目標達成！'; s.textContent=`週${done}日学習 — 素晴らしいペースです！`; }
  else if (done >= 3) { b.className='week-banner on-track'; i.textContent='✅'; t.textContent='スケジュール通り'; s.textContent=`今週${done}日学習 — あと${target-done}日で週目標達成`; }
  else if (done >= 1) { b.className='week-banner behind'; i.textContent='⚠️'; t.textContent='やや遅れ気味'; s.textContent=`今週${done}日学習 — 週5日ペースを目指しましょう`; }
  else { b.className='week-banner behind'; i.textContent='📖'; t.textContent='今週はまだ学習記録なし'; s.textContent='今日から記録をつけてみましょう！'; }
}

// ===== 進捗 =====
function getProgress(id) { const ks = Object.keys(state).filter(k=>k.startsWith(`ag-${id}-`)); return {done:ks.filter(k=>state[k]).length, total:ks.length}; }
function getCatProg(id,ci) { const ks = Object.keys(state).filter(k=>k.startsWith(`ag-${id}-${ci}-`)); return {done:ks.filter(k=>state[k]).length, total:ks.length}; }
function getTotalProg() { const ks = Object.keys(state); return {done:ks.filter(k=>state[k]).length, total:ks.length}; }
function pct(d,t) { return t ? Math.round(d/t*100) : 0; }

function updateAll() {
  const tot = getTotalProg();
  document.getElementById('totalFill').style.width = pct(tot.done,tot.total) + '%';
  document.getElementById('totalLabel').textContent = `${tot.done} / ${tot.total}`;
  PHASES.filter(p=>p.categories).forEach(p => {
    const pg = getProgress(p.id);
    const f = document.getElementById(`sfill-${p.id}`), tx = document.getElementById(`stext-${p.id}`);
    if(f) f.style.width = pct(pg.done,pg.total)+'%';
    if(tx) tx.textContent = `${pg.done} / ${pg.total} 完了`;
    const tab = document.getElementById(`tab-${p.id}`);
    if(tab){ const c=tab.querySelector('.tab-count'); if(c) c.textContent=`${pg.done}/${pg.total}`; }
    p.categories.forEach((_,ci) => {
      const cp=getCatProg(p.id,ci);
      const mf=document.getElementById(`mfill-${p.id}-${ci}`), mp=document.getElementById(`mpct-${p.id}-${ci}`), cc=document.getElementById(`ccount-${p.id}-${ci}`);
      if(mf) mf.style.width=pct(cp.done,cp.total)+'%';
      if(mp) mp.textContent=pct(cp.done,cp.total)+'%';
      if(cc) cc.textContent=`${cp.done}/${cp.total}`;
    });
  });
}

function toggle(k) {
  state[k] = !state[k]; save(k);
  document.querySelector(`[data-key="${k}"]`)?.classList.toggle('checked', state[k]);
  updateAll();
}

// ===== 週間カレンダー =====
function buildWeekly() {
  const el = document.getElementById('weeklyCalendar'); if(!el) return;
  const days = getWeekDays(), today = new Date();
  const dn = ['月','火','水','木','金','土','日'];
  el.innerHTML = days.map((d,i) => {
    const isToday = d.toDateString()===today.toDateString(), done=isDayDone(d);
    return `<div class="day-card ${done?'done':''} ${isToday?'today':''}" onclick="toggleDay(new Date(${d.getFullYear()},${d.getMonth()},${d.getDate()}))">
      <div class="day-name">${dn[i]}</div><div class="day-num">${d.getDate()}</div><div class="day-check"></div></div>`;
  }).join('');
  const ld = document.getElementById('logDate');
  if(ld && !ld.value){ const t=new Date(); ld.value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
}

// ===== UI構築 =====
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.getElementById(`tab-${id}`)?.classList.add('active');
  document.getElementById(`sec-${id}`)?.classList.add('visible');
}

function buildScheduleSection() {
  const catMap = { chosashi: 'dot-chosashi', ryosoku: 'dot-ryosoku', other: 'dot-other' };
  return `
    <div class="section-hero hero-schedule">
      <div class="section-icon">🗓</div>
      <div class="section-prog-wrap">
        <div class="section-title">月別おすすめ学習スケジュール</div>
        <div class="section-prog-text">各月の学習内容の目安です。参考にして進めてください</div>
      </div>
    </div>
    <div class="sched-grid">
      ${SCHEDULE.map(m => `
        <div class="sched-card">
          <div class="sched-card-header ${m.cls}">${m.icon} ${m.period}</div>
          <div class="sched-body">
            ${m.weeks.map(w => `
              <div class="sched-week">
                <div class="sched-week-title">${w.title}</div>
                ${w.items.map(item => `
                  <div class="sched-item">
                    <div class="sched-dot ${catMap[item.cat] || 'dot-other'}"></div>
                    <div>
                      <div class="sched-text">${item.text}</div>
                      <div class="sched-sub">${item.sub}</div>
                    </div>
                  </div>`).join('')}
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--muted);padding:4px 2px;display:flex;gap:14px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#7052a8;margin-right:4px;vertical-align:middle"></span>土地家屋調査士</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#3d8c6e;margin-right:4px;vertical-align:middle"></span>測量士補</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#b07d2e;margin-right:4px;vertical-align:middle"></span>その他（免許・ドローン等）</span>
    </div>`;
}

function buildUI() {
  const tabsEl = document.getElementById('tabs'), secsEl = document.getElementById('sections');
  PHASES.forEach((p, pi) => {
    const pg = p.categories ? getProgress(p.id) : {done:0,total:0};
    const tab = document.createElement('button');
    tab.className = 'tab' + (pi===0?' active':'');
    tab.id = `tab-${p.id}`; tab.onclick = () => switchTab(p.id);
    const cnt = p.categories ? `<span class="tab-count">${pg.done}/${pg.total}</span>` : '';
    tab.innerHTML = `<span class="tab-icon">${p.icon}</span>${p.label}${cnt}`;
    tabsEl.appendChild(tab);

    const sec = document.createElement('div');
    sec.className = 'section' + (pi===0?' visible':'');
    sec.id = `sec-${p.id}`;

    if (p.type === 'weekly') {
      sec.innerHTML = `
        <div class="section-hero hero-weekly"><div class="section-icon">📅</div>
          <div class="section-prog-wrap"><div class="section-title">今週の学習記録</div>
            <div class="section-prog-text">学習した日をタップしてチェック（週5日目標）</div></div></div>
        <div class="weekly-grid" id="weeklyCalendar"></div>
        <div class="study-log">
          <h3>📝 学習メモを記録</h3>
          <div class="log-row"><span class="log-label">日付</span><input type="date" id="logDate" class="log-input" style="max-width:140px"></div>
          <div class="log-row"><span class="log-label">学習内容</span><input type="text" id="logContent" class="log-input" placeholder="例：土地家屋調査士法 1〜5章視聴"></div>
          <div class="log-row"><span class="log-label">時間（h）</span><input type="number" id="logHours" class="log-input" style="max-width:70px" value="1" min="0.5" step="0.5"><button class="log-btn" onclick="addLog()">記録する</button></div>
          <div class="log-history" id="logHistory"></div>
        </div>`;
    } else if (p.type === 'schedule') {
      sec.innerHTML = buildScheduleSection();
    } else {
      const badgeMap = { open:['badge-open','受講可'], wait:['badge-wait','後半以降'], key:['badge-key','重要'] };
      sec.innerHTML = `
        <div class="section-hero ${p.heroClass}">
          <div class="section-icon">${p.icon}</div>
          <div class="section-prog-wrap">
            <div class="section-title">${p.label}</div>
            <div class="section-prog-text" id="stext-${p.id}">${pg.done} / ${pg.total} 完了</div>
            <div class="section-prog-bar"><div class="section-prog-fill" id="sfill-${p.id}" style="width:${pct(pg.done,pg.total)}%;background:${p.barColor};"></div></div>
          </div>
        </div>
        <div class="cat-grid">
          ${p.categories.map((cat,ci) => {
            const cp = getCatProg(p.id,ci);
            return `<div class="cat-card">
              <div class="cat-header"><span class="cat-header-icon">${cat.icon}</span>${cat.name}<span class="cat-count" id="ccount-${p.id}-${ci}">${cp.done}/${cp.total}</span></div>
              <div class="cat-items">
                ${cat.items.map((item,ii) => {
                  const k=`ag-${p.id}-${ci}-${ii}`, checked=state[k];
                  const [bc,bt]=badgeMap[item.badge]||['badge-open',''];
                  return `<div class="item ${checked?'checked':''}" data-key="${k}" onclick="toggle('${k}')">
                    <div class="checkbox"><span class="checkmark"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>
                    <div class="item-body"><div class="item-name">${item.name}</div><div class="item-meta">${item.meta}</div><span class="badge-tag ${bc}">${bt}</span></div>
                  </div>`;
                }).join('')}
              </div>
              <div class="cat-progress"><div class="mini-bar"><div class="mini-bar-fill" id="mfill-${p.id}-${ci}" style="width:${pct(cp.done,cp.total)}%;background:${p.barColor};"></div></div><span class="mini-pct" id="mpct-${p.id}-${ci}">${pct(cp.done,cp.total)}%</span></div>
            </div>`;
          }).join('')}
        </div>`;
    }
    secsEl.appendChild(sec);
  });
  buildWeekly(); renderLogs(); updateBanner();
}

function resetAll() {
  if (!confirm('すべての記録をリセットしますか？')) return;
  Object.keys(state).forEach(k => { state[k]=false; try{localStorage.removeItem(k);}catch{} });
  try{localStorage.removeItem('study-logs');}catch{}
  getWeekDays().forEach(d => { try{localStorage.removeItem(dateKey(d));}catch{} });
  document.querySelectorAll('.item').forEach(el=>el.classList.remove('checked'));
  updateAll(); buildWeekly(); renderLogs(); updateBanner();
}

buildUI(); updateAll();
</script>
